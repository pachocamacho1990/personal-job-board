services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jobboard-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobboard
      POSTGRES_USER: jobboard_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U jobboard_user -d jobboard" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: jobboard-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: jobboard
      DB_USER: jobboard_user
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: jobboard-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - agent

  # Python Agent Service
  agent:
    build:
      context: ./agent-service
      dockerfile: Dockerfile
    container_name: jobboard-agent
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://jobboard_user:${DB_PASSWORD}@postgres:5432/jobboard
      JWT_SECRET: ${JWT_SECRET}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      EXPRESS_API_URL: http://api:3000/api
      TEST_MODE: ${TEST_MODE:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./agent-service:/app

volumes:
  postgres_data:
    driver: local
